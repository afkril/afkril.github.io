<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAN - Cargando</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 50%, #1a0a2e 0%, #0d1b3e 30%, #050810 70%, #000000 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #e2e8f0;
            position: relative;
        }

        #bg-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #hex-canvas {
            position: relative;
            z-index: 5;
        }

        .bottom-ui {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: 20px;
        }

        .loading-text {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: fadeText 1.5s ease-in-out infinite;
        }

        .loading-subtext {
            font-size: 11px;
            color: #475569;
            margin-top: 6px;
        }

        @keyframes fadeText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .progress-container {
            width: 220px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            margin: 14px auto 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4af37, #00f2ff);
            transition: width 0.5s ease;
            box-shadow: 0 0 8px rgba(0,242,255,0.6);
        }

        .connection-status {
            position: absolute;
            top: 18px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #64748b;
            z-index: 20;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ff4655;
            animation: statusPulse 2s infinite;
        }

        .status-dot.online { background: #22c55e; }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .version {
            position: absolute;
            bottom: 16px;
            font-size: 10px;
            color: #334155;
            z-index: 20;
        }

        body.fade-out {
            animation: fadeOut 0.6s ease forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="connection-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Verificando conexión...</span>
    </div>

    <canvas id="hex-canvas" width="320" height="320"></canvas>

    <div class="bottom-ui">
        <div class="loading-text" id="loadingText">Inicializando sistema</div>
        <div class="loading-subtext" id="loadingSubtext">Cargando módulos locales...</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="version">v3.3 | ZAN Tabla de Valores</div>

    <script>
    (function(){
        /* ── Canvas setup ── */
        const body = document.body;
        const bgC = document.getElementById('bg-canvas');
        const bgX = bgC.getContext('2d');
        const hC  = document.getElementById('hex-canvas');
        const hX  = hC.getContext('2d');
        let W, H, stars = [], nodes = [];

        function resize(){
            W = window.innerWidth;
            H = window.innerHeight;
            bgC.width  = W;
            bgC.height = H;
        }
        resize();
        window.addEventListener('resize', resize);

        /* ── Stars ── */
        for(let i=0; i<150; i++) stars.push({
            x: Math.random()*W,
            y: Math.random()*H,
            r: Math.random()*1.4+0.2,
            a: Math.random(),
            s: Math.random()*0.005+0.002
        });

        /* ── Network nodes ── */
        for(let i=0; i<22; i++) nodes.push({
            x: Math.random()*W,
            y: Math.random()*H,
            vx: (Math.random()-0.5)*0.35,
            vy: (Math.random()-0.5)*0.35,
            r: Math.random()*2+1.5
        });

        let t = 0;

        /* ── Background ── */
        function drawBg(){
            bgX.fillStyle = 'rgba(5,8,16,0.13)';
            bgX.fillRect(0,0,W,H);

            stars.forEach(s => {
                s.a += s.s;
                if(s.a > 1 || s.a < 0) s.s *= -1;
                bgX.beginPath();
                bgX.arc(s.x, s.y, s.r, 0, Math.PI*2);
                bgX.fillStyle = `rgba(180,210,255,${s.a*0.7})`;
                bgX.fill();
            });

            nodes.forEach(n => {
                n.x += n.vx; n.y += n.vy;
                if(n.x < 0 || n.x > W) n.vx *= -1;
                if(n.y < 0 || n.y > H) n.vy *= -1;
            });

            nodes.forEach((a, i) => {
                nodes.forEach((b, j) => {
                    if(j <= i) return;
                    const dx = a.x-b.x, dy = a.y-b.y;
                    const d  = Math.sqrt(dx*dx+dy*dy);
                    if(d < 180){
                        bgX.beginPath();
                        bgX.moveTo(a.x, a.y);
                        bgX.lineTo(b.x, b.y);
                        bgX.strokeStyle = `rgba(0,180,220,${0.18*(1-d/180)})`;
                        bgX.lineWidth = 0.5;
                        bgX.stroke();
                    }
                });
            });

            nodes.forEach(n => {
                bgX.beginPath();
                bgX.arc(n.x, n.y, n.r, 0, Math.PI*2);
                bgX.fillStyle = 'rgba(0,210,255,0.55)';
                bgX.fill();
            });
        }

        /* ── Hexagonal cube geometry ── */
        const cx = 160, cy = 160, R = 95;
        const hex6 = Array.from({length:6}, (_, i) => {
            const a = Math.PI/6 + i*Math.PI/3;
            return [cx + R*Math.cos(a), cy + R*Math.sin(a)];
        });
        const hex3 = Array.from({length:6}, (_, i) => {
            const a = Math.PI/6 + i*Math.PI/3;
            return [cx + R*0.52*Math.cos(a), cy + R*0.52*Math.sin(a)];
        });

        /* ── Crystal shards ── */
        const shards = [];
        for(let i=0; i<14; i++){
            const a = Math.random()*Math.PI*2;
            const d = R*0.45 + Math.random()*R*0.65;
            shards.push({
                x: cx + d*Math.cos(a),
                y: cy + d*Math.sin(a),
                vx: (Math.cos(a)*0.28 + Math.random()*0.18-0.09),
                vy: (Math.sin(a)*0.28 + Math.random()*0.18-0.09),
                s: 5 + Math.random()*10,
                rot: Math.random()*Math.PI*2,
                rotV: (Math.random()-0.5)*0.04,
                a: 0.5 + Math.random()*0.5,
                float: Math.random()*Math.PI*2
            });
        }

        /* ── Bar chart inside hex ── */
        function drawBarChart(){
            const barH = 16, barY = cy+50, barW = 64;
            for(let i=0; i<7; i++){
                const bx = cx - barW/2 + i*(barW/7) + 1;
                const bh = Math.abs(Math.sin(t*0.04 + i*0.8)) * barH;
                hX.fillStyle = `rgba(0,200,255,${0.4+i*0.04})`;
                hX.fillRect(bx, barY-bh, (barW/7)-1.5, bh);
            }
        }

        /* ── Hexagonal cube ── */
        function drawHex(){
            hX.clearRect(0,0,320,320);
            const pulse = Math.sin(t*0.03)*0.06 + 0.94;
            const glow  = Math.abs(Math.sin(t*0.02));

            /* Shards */
            shards.forEach(s => {
                s.float += 0.012;
                s.rot   += s.rotV;
                const fx = s.x + Math.cos(s.float)*2.8;
                const fy = s.y + Math.sin(s.float)*2.8;
                hX.save();
                hX.translate(fx, fy);
                hX.rotate(s.rot);
                hX.beginPath();
                hX.moveTo(0, -s.s);
                hX.lineTo(s.s*0.6, s.s*0.5);
                hX.lineTo(-s.s*0.6, s.s*0.5);
                hX.closePath();
                const ga = hX.createLinearGradient(-s.s,0,s.s,0);
                ga.addColorStop(0, `rgba(160,210,255,${s.a*0.5})`);
                ga.addColorStop(0.5, `rgba(255,255,255,${s.a*0.85})`);
                ga.addColorStop(1, `rgba(212,175,55,${s.a*0.5})`);
                hX.fillStyle = ga; hX.fill();
                hX.strokeStyle = `rgba(0,220,255,${s.a*0.45})`;
                hX.lineWidth = 0.5; hX.stroke();
                hX.restore();
            });

            /* Diagonal inner lines */
            const diags = [[0,3],[1,4],[2,5],[0,2],[1,3],[2,4],[3,5],[4,0],[5,1]];
            diags.forEach(([a,b]) => {
                hX.beginPath();
                hX.moveTo(hex6[a][0], hex6[a][1]);
                hX.lineTo(hex6[b][0], hex6[b][1]);
                hX.strokeStyle = `rgba(0,190,255,${0.12+glow*0.08})`;
                hX.lineWidth = 0.7; hX.stroke();
            });

            /* Inner hex lines */
            const inner = [[0,2],[1,3],[2,4],[3,5],[4,0],[5,1]];
            inner.forEach(([a,b]) => {
                hX.beginPath();
                hX.moveTo(hex3[a][0], hex3[a][1]);
                hX.lineTo(hex3[b][0], hex3[b][1]);
                hX.strokeStyle = `rgba(212,175,55,${0.22+glow*0.12})`;
                hX.lineWidth = 0.6; hX.stroke();
            });

            /* Spokes */
            for(let i=0; i<6; i++){
                hX.beginPath();
                hX.moveTo(hex6[i][0], hex6[i][1]);
                hX.lineTo(hex3[i][0], hex3[i][1]);
                hX.strokeStyle = `rgba(0,210,255,${0.18+glow*0.12})`;
                hX.lineWidth = 0.5; hX.stroke();
            }

            /* Outer hex fill + border */
            hX.beginPath();
            hex6.forEach(([x,y], i) => i===0 ? hX.moveTo(x,y) : hX.lineTo(x,y));
            hX.closePath();
            const radG = hX.createRadialGradient(cx,cy,0,cx,cy,R);
            radG.addColorStop(0, `rgba(0,80,160,${0.14*pulse})`);
            radG.addColorStop(1, 'rgba(0,0,0,0)');
            hX.fillStyle = radG; hX.fill();
            hX.strokeStyle = `rgba(0,230,255,${0.55+glow*0.3})`;
            hX.lineWidth = 1.6; hX.stroke();

            /* Node dots */
            hex6.forEach(([x,y], i) => {
                const gold = i % 2 === 0;
                const cr   = gold ? 4.5 : 3;
                const col  = gold ? `rgba(212,175,55,${0.75+glow*0.25})` : `rgba(0,220,255,${0.75+glow*0.25})`;
                hX.shadowBlur   = 10;
                hX.shadowColor  = gold ? 'rgba(212,175,55,.9)' : 'rgba(0,220,255,.9)';
                hX.beginPath(); hX.arc(x,y,cr,0,Math.PI*2);
                hX.fillStyle = col; hX.fill();
                hX.shadowBlur = 0;
            });

            /* ZAN text */
            hX.save();
            hX.shadowBlur   = 22;
            hX.shadowColor  = 'rgba(0,220,255,0.8)';
            hX.font         = `bold ${Math.round(38*pulse)}px 'Inter', sans-serif`;
            hX.textAlign    = 'center';
            hX.textBaseline = 'middle';
            const tg = hX.createLinearGradient(cx-40,cy,cx+40,cy);
            tg.addColorStop(0,   '#00e5ff');
            tg.addColorStop(0.5, '#80f4ff');
            tg.addColorStop(1,   '#00b8d4');
            hX.fillStyle = tg;
            hX.fillText('ZAN', cx, cy-10);
            hX.shadowBlur = 0;
            hX.font = `11px 'Inter', sans-serif`;
            hX.fillStyle = `rgba(150,215,235,${0.55+glow*0.3})`;
            hX.fillText('Tabla de Valores', cx, cy+18);
            hX.restore();

            drawBarChart();
        }

        /* ── Main loop ── */
        function loop(){
            t++;
            drawBg();
            drawHex();
            requestAnimationFrame(loop);
        }
        loop();

        /* ── Connection status ── */
        const dot  = document.getElementById('statusDot');
        const stxt = document.getElementById('statusText');
        function updateStatus(online){
            dot.classList.toggle('online', online);
            stxt.textContent = online ? 'Conectado' : 'Modo offline';
        }
        updateStatus(navigator.onLine);
        window.addEventListener('online',  () => updateStatus(true));
        window.addEventListener('offline', () => updateStatus(false));

        /* ── Loading sequence ── */
        const states = [
            { text:'Inicializando sistema',     sub:'Cargando módulos locales...',  pct:10,  d:0    },
            { text:'Verificando base de datos', sub:'LocalStorage y caché...',      pct:35,  d:600  },
            { text:'Conectando con Firebase',   sub:'Sincronización en la nube...', pct:60,  d:1300 },
            { text:'Cargando configuración',    sub:'Proveedores y productos...',   pct:80,  d:2000 },
            { text:'Listo',                     sub:'Iniciando aplicación...',      pct:100, d:2600 }
        ];
        const ltxt = document.getElementById('loadingText');
        const lsub = document.getElementById('loadingSubtext');
        const prog = document.getElementById('progressBar');

        states.forEach(s => setTimeout(() => {
            ltxt.textContent = s.text;
            lsub.textContent = s.sub;
            prog.style.width = s.pct + '%';
        }, s.d));

        /* ── Redirect ── */
        setTimeout(() => {
            body.classList.add('fade-out');
            setTimeout(() => { window.location.href = 'index.html'; }, 650);
        }, 3200);

    })();
    </script>
</body>
</html>
