        <!-- SECCIoN CALCULADORA SEMANAL -->
        <div id="section-calculator" class="section active">
            <div class="config-panel no-print">
                <div class="config-row">
                    <div class="form-group">
                        <label class="form-label">Niños</label>
                        <input type="number" class="form-input" id="num-p" value="13" min="1" max="500" style="width: 60px;">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Semana</label>
                        <select class="form-select" id="sem" style="width: 130px;">
                            <option value="1">Sem 1 (M1-5)</option>
                            <option value="2">Sem 2 (M6-10)</option>
                            <option value="3">Sem 3 (M11-15)</option>
                            <option value="4">Sem 4 (M16-20)</option>
                            <option value="5">Sem 5 (M21-25)</option>
                        </select>
                    </div>

                    <div class="form-group" style="flex: 1; min-width: 220px;">
                        <label class="form-label">Dias</label>
                        <div class="days-selector">
                            <label class="day-chip">
                                <input type="checkbox" class="d-ch" value="1" checked>
                                <span class="day-label">Lun</span>
                            </label>
                            <label class="day-chip">
                                <input type="checkbox" class="d-ch" value="2" checked>
                                <span class="day-label">Mar</span>
                            </label>
                            <label class="day-chip">
                                <input type="checkbox" class="d-ch" value="3" checked>
                                <span class="day-label">Mié</span>
                            </label>
                            <label class="day-chip">
                                <input type="checkbox" class="d-ch" value="4" checked>
                                <span class="day-label">Jue</span>
                            </label>
                            <label class="day-chip">
                                <input type="checkbox" class="d-ch" value="5" checked>
                                <span class="day-label">Vie</span>
                            </label>
                        </div>
                    </div>

                    <div class="status-indicator" id="statusIndicator" title="Regional y Modalidad activas">
						<span class="status-label">Config:</span>
						<span class="status-badge reg-neiva" id="statusRegional">🏢 NEIVA</span>
						<span class="status-divider"></span>
						<span class="status-badge mod-hcb" id="statusModalidad">🏠 HCB</span>
					</div>

					<button class="btn btn-primary" onclick="generar()" id="btnGenerar">
						<span class="spinner"></span>
						<span class="btn-text"><span>🚀</span> Generar</span>
					</button>
                
					
						<div style="display:flex;align-items:center;gap:0.35rem;padding:0.3rem 0.65rem;background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.22);border-radius:0.5rem;">
							<span class="status-label">Config:</span>
							<span style="font-size:0.9rem;">🥛</span>
							<label class="form-label" style="margin:0;white-space:nowrap;font-size:0.72rem;">Leche</label>
							<select class="form-select" id="leche-modo-semanal" style="width:130px;padding:0.25rem 0.4rem;font-size:0.75rem;background:var(--bg-dark);border:1px solid var(--border);border-radius:0.375rem;color:var(--text-primary);">
								<option value="litros">Litros (L)</option>
								<option value="bolsas900">Bolsas 900 ml</option>
								<option value="ml">Mililitros (ml)</option>
							</select>
							<span style="font-size:0.9rem;">🍶</span>
							<label class="form-label" style="margin:0;white-space:nowrap;font-size:0.72rem;">Yogurt</label>
							<select class="form-select" id="yogurt-modo-semanal" style="width:130px;padding:0.25rem 0.4rem;font-size:0.75rem;background:var(--bg-dark);border:1px solid var(--border);border-radius:0.375rem;color:var(--text-primary);">
								<option value="und150">Unidades 150 ml</option>
								<option value="litros">Litros (L)</option>
							</select>
							
						</div>
				</div>
            </div>

            <div class="search-container no-print" id="searchContainer" style="display: none;">
                <span class="search-icon">🔍</span>
                <input type="search" class="search-input" id="buscador" placeholder="Buscar producto..." oninput="filtrarBusquedaDebounced(this.value)">
            </div>

            <div class="category-filters no-print" id="catFilters" style="display: none;">
                <div class="category-card cat-granos active" onclick="toggleCategory(this, 'granos')">
                    <span class="category-icon">🌾</span>
                    <span class="category-name">Granos</span>
                    <span class="category-count" id="count-granos">0</span>
                </div>
                <div class="category-card cat-proteinas active" onclick="toggleCategory(this, 'proteinas')">
                    <span class="category-icon">🥩</span>
                    <span class="category-name">Proteinas</span>
                    <span class="category-count" id="count-proteinas">0</span>
                </div>
                <div class="category-card cat-lacteos active" onclick="toggleCategory(this, 'lacteos')">
                    <span class="category-icon">🥛</span>
                    <span class="category-name">Lacteos</span>
                    <span class="category-count" id="count-lacteos">0</span>
                </div>
                <div class="category-card cat-verduras active" onclick="toggleCategory(this, 'verduras')">
                    <span class="category-icon">🥬</span>
                    <span class="category-name">Verduras</span>
                    <span class="category-count" id="count-verduras">0</span>
                </div>
                <div class="category-card cat-frutas active" onclick="toggleCategory(this, 'frutas')">
                    <span class="category-icon">🍎</span>
                    <span class="category-name">Frutas</span>
                    <span class="category-count" id="count-frutas">0</span>
                </div>
                <div class="category-card cat-panaderia active" onclick="toggleCategory(this, 'panaderia')">
                    <span class="category-icon">🥖</span>
                    <span class="category-name">Panaderia</span>
                    <span class="category-count" id="count-panaderia">0</span>
                </div>
            </div>

            <div class="table-container" id="resultContainer" style="display: none;">
                
                <div class="table-header no-print">
                    <div class="table-title">Lista de Compras</div>
                    <div class="table-actions">
                        <button class="btn-icon" onclick="exportExcel()" title="Excel">📊</button>
                        <button class="btn-icon" onclick="guardarLista()" title="Guardar">💾</button>
						<button class="btn-icon" onclick="limpiarEntregasSemanal()" title="Limpiar Entregas">🧹</button>
                    </div>
                </div>
                
                <div id="resultado">
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <p>Genere la lista para ver resultados</p>
                    </div>
                </div>

                <div class="table-header no-print" style="border-top: 1px solid var(--border); border-bottom: none; padding: 0.375rem 0.75rem;">
                    <div style="font-size: 0.75rem; color: var(--text-secondary);">
                        <span id="totalItems">0</span> productos • <span id="lastUpdate">--</span>
                    </div>
                </div>
            </div>
        </div>
